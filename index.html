<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN-API Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f12;
      --surface:    #13161b;
      --card:       #1a1e25;
      --border:     #252a34;
      --border2:    #2f3544;
      --green:      #22c55e;
      --green-dim:  #16a34a;
      --green-glow: rgba(34,197,94,.14);
      --text:       #e2e8f0;
      --muted:      #64748b;
      --accent:     #38bdf8;
      --danger:     #f87171;
      --radius:     10px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 60px;
    }

    header { width: 100%; max-width: 1100px; display: flex; align-items: center; margin-bottom: 32px; }
    .logo { display: flex; align-items: center; gap: 11px; }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: pulse 2.2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 8px var(--green); }
      50%      { opacity:.5; box-shadow: 0 0 22px var(--green); }
    }
    .logo-text { font-family: 'Space Mono', monospace; font-size: 1.05rem; font-weight: 700; letter-spacing: .06em; color: var(--green); line-height: 1.2; }
    .logo-sub  { font-size: .68rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    .workspace { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 370px 1fr; gap: 20px; align-items: start; }
    .left-col  { display: flex; flex-direction: column; gap: 14px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .card-title {
      font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .13em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px 18px; }
    .section-label { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); margin-bottom: 13px; }

    .field { margin-bottom: 12px; }
    .field:last-of-type { margin-bottom: 0; }
    label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 5px; }

    input[type="text"], textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border2); border-radius: 7px;
      color: var(--text); font-family: 'Space Mono', monospace; font-size: .76rem;
      padding: 9px 12px; outline: none; transition: border-color .18s, box-shadow .18s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
    textarea { resize: vertical; min-height: 66px; }

    .api-btn {
      display: block; width: 100%; margin-top: 13px; padding: 10px 16px;
      background: var(--card); border: 1px solid var(--green-dim); border-radius: 7px;
      color: var(--green); font-family: 'Space Mono', monospace; font-size: .74rem;
      letter-spacing: .08em; cursor: pointer;
      transition: background .18s, box-shadow .18s, opacity .18s;
      position: relative; overflow: hidden;
    }
    .api-btn:hover:not(:disabled) { background: var(--green-glow); box-shadow: 0 0 16px var(--green-glow); }
    .api-btn:active:not(:disabled) { opacity: .8; }
    .api-btn:disabled { opacity: .45; cursor: not-allowed; }
    .api-btn.loading::after {
      content: ''; position: absolute; bottom: 0; left: -100%;
      width: 100%; height: 2px; background: var(--green);
      animation: sweep 0.9s linear infinite;
    }
    @keyframes sweep { to { left: 100%; } }

    .response-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; min-height: 480px; }
    .response-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .response-title { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .13em; text-transform: uppercase; color: var(--muted); }
    #clearBtn {
      background: transparent; border: 1px solid var(--border2); border-radius: 20px;
      color: var(--muted); font-family: 'Space Mono', monospace; font-size: .6rem;
      letter-spacing: .08em; padding: 3px 11px; cursor: pointer; transition: background .15s, color .15s;
    }
    #clearBtn:hover { background: rgba(255,255,255,.05); color: var(--text); }

    .response-meta {
      display: flex; align-items: center; gap: 7px; padding: 9px 20px;
      border-bottom: 1px solid var(--border); font-family: 'Space Mono', monospace;
      font-size: .68rem; color: var(--muted); min-height: 35px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background .25s, box-shadow .25s; }
    .status-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.err { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    #metaMethod { color: var(--accent); }

    .response-body { flex: 1; padding: 18px 20px; overflow-y: auto; }
    #responseOutput { font-family: 'Space Mono', monospace; font-size: .76rem; line-height: 1.75; white-space: pre-wrap; word-break: break-all; color: #86efac; }
    #responseOutput.placeholder { color: var(--border2); }

    @media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } .response-panel { min-height: 360px; } }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">GREEN-API</div>
      <div class="logo-sub">WhatsApp Console</div>
    </div>
  </div>
</header>

<div class="workspace">
  <div class="left-col">

    <div class="card">
      <div class="card-title">Instance Credentials</div>
      <div class="field">
        <label>IdInstance</label>
        <input type="text" id="idInstance" placeholder="1101234567" />
      </div>
      <div class="field">
        <label>ApiTokenInstance</label>
        <input type="text" id="apiToken" placeholder="d75b3a66374942c5b3c6b1dbd..." />
      </div>
    </div>

    <div class="section">
      <div class="section-label">GET · Instance Settings</div>
      <button class="api-btn" id="btnGetSettings">getSettings</button>
    </div>

    <div class="section">
      <div class="section-label">GET · Instance State</div>
      <button class="api-btn" id="btnGetState">getStateInstance</button>
    </div>

    <div class="section">
      <div class="section-label">POST · Send Text Message</div>
      <div class="field">
        <label>Recipient Phone (with country code)</label>
        <input type="text" id="sendMsgPhone" placeholder="79001234567" />
      </div>
      <div class="field">
        <label>Message Text</label>
        <textarea id="sendMsgText" placeholder="Hello, World!"></textarea>
      </div>
      <button class="api-btn" id="btnSendMessage">sendMessage</button>
    </div>

    <div class="section">
      <div class="section-label">POST · Send File By URL</div>
      <div class="field">
        <label>Recipient Phone (with country code)</label>
        <input type="text" id="sendFilePhone" placeholder="79001234567" />
      </div>
      <div class="field">
        <label>File URL</label>
        <input type="text" id="sendFileUrl" placeholder="https://example.com/photo.jpg" />
      </div>
      <div class="field">
        <label>File Name</label>
        <input type="text" id="sendFileName" placeholder="photo.jpg" />
      </div>
      <div class="field">
        <label>Caption (optional)</label>
        <input type="text" id="sendFileCaption" placeholder="Check this out!" />
      </div>
      <button class="api-btn" id="btnSendFile">sendFileByUrl</button>
    </div>

  </div>

  <div class="response-panel">
    <div class="response-header">
      <span class="response-title">Response</span>
      <button id="clearBtn">clear</button>
    </div>
    <div class="response-meta">
      <div class="status-dot" id="statusDot"></div>
      <span id="metaMethod"></span>
      <span id="metaTime">awaiting request…</span>
    </div>
    <div class="response-body" id="responseBody">
      <div id="responseOutput" class="placeholder">// Response will appear here…</div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const BASE = 'https://api.green-api.com';

  const elId     = document.getElementById('idInstance');
  const elToken  = document.getElementById('apiToken');
  const elDot    = document.getElementById('statusDot');
  const elMethod = document.getElementById('metaMethod');
  const elTime   = document.getElementById('metaTime');
  const elBody   = document.getElementById('responseBody');

  function paint(method, data, ok) {
    elDot.className      = 'status-dot ' + (ok ? 'ok' : 'err');
    elMethod.textContent = method;
    elTime.textContent   = '· ' + new Date().toLocaleTimeString();
    const next           = document.createElement('div');
    next.id              = 'responseOutput';
    next.textContent     = JSON.stringify(data, null, 2);
    elBody.replaceChildren(next);
    elBody.scrollTop     = 0;
  }

  function paintError(method, msg) { paint(method, { error: msg }, false); }

  function paintClear() {
    elDot.className      = 'status-dot';
    elMethod.textContent = '';
    elTime.textContent   = 'awaiting request…';
    const next           = document.createElement('div');
    next.id              = 'responseOutput';
    next.className       = 'placeholder';
    next.textContent     = '// Response will appear here…';
    elBody.replaceChildren(next);
  }

  function busy(btn, on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function creds() {
    const id    = elId.value.trim();
    const token = elToken.value.trim();
    if (!id || !token) { paintError('Error', 'Please fill in IdInstance and ApiTokenInstance'); return null; }
    return { id, token };
  }

  async function apiFetch(method, url, body) {
    const init = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) init.body = JSON.stringify(body);
    const res  = await fetch(url, init);
    const json = await res.json().catch(() => ({ httpStatus: res.status }));
    return json;
  }

  // ── getSettings ───────────────────────────────────────────────
  async function onGetSettings() {
    const c = creds(); if (!c) return;
    const btn = document.getElementById('btnGetSettings');
    busy(btn, true);
    try   { paint('getSettings', await apiFetch('GET', `${BASE}/waInstance${c.id}/getSettings/${c.token}`), true); }
    catch (e) { paintError('getSettings', e.message); }
    finally   { busy(btn, false); }
  }

  // ── getStateInstance ──────────────────────────────────────────
  async function onGetState() {
    const c = creds(); if (!c) return;
    const btn = document.getElementById('btnGetState');
    busy(btn, true);
    try   { paint('getStateInstance', await apiFetch('GET', `${BASE}/waInstance${c.id}/getStateInstance/${c.token}`), true); }
    catch (e) { paintError('getStateInstance', e.message); }
    finally   { busy(btn, false); }
  }

  document.getElementById('btnGetSettings').addEventListener('click', onGetSettings);
  document.getElementById('btnGetState').addEventListener('click', onGetState);
  document.getElementById('clearBtn').addEventListener('click', paintClear);

})();
</script>
</body>
</html>
